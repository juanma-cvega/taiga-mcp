# Releases on every push to main that carries a releasable commit:
#   feat: -> minor    fix:/perf: -> patch    BREAKING CHANGE: footer -> major
# A push with only chore:/docs:/ci:/test:/style:/refactor: commits runs the
# checks and stops -- no bump, no tag, no release.
#
# python-semantic-release owns the version end to end: it reads the commit
# history since the last tag, stamps pyproject.toml, writes the changelog,
# commits, tags v{version} and publishes the GitHub Release (notes only -- see
# the note on immutable releases below for why no build artifacts are attached).
# Never bump the version by hand -- the commit history is the source of truth.
# Settings live in [tool.semantic_release] in pyproject.toml.
name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest

    # Serialise releases: two pushes in flight would otherwise race to compute
    # and tag the same version. Never cancel a half-finished release.
    concurrency:
      group: ${{ github.workflow }}-release-${{ github.ref_name }}
      cancel-in-progress: false

    permissions:
      contents: write # push the release commit and tag, create the release

    steps:
      - name: Setup | Check out the release branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          # The action does not unshallow, and semantic-release needs the full
          # history plus tags to find the last release and pick the bump.
          fetch-depth: 0

      - name: Setup | Pin the release branch to this workflow's commit
        # Guards against releasing a newer commit that landed on main while
        # this run was queued.
        run: git reset --hard ${{ github.sha }}

      - name: Setup | Install uv
        uses: astral-sh/setup-uv@v7

      - name: Setup | Install dependencies
        run: uv sync

      - name: Check | Lint, format, types, tests
        # Gate the release on the same hooks that run pre-commit locally: a
        # failure here stops the release before anything is tagged.
        run: uv run pre-commit run --all-files

      - name: Release | Bump the version, commit, tag and release
        # No asset upload step follows: GitHub creates releases as immutable,
        # so assets have to be sealed in at creation, which PSR's separate
        # upload step cannot do -- it would fail the run after tagging. The
        # tag and the generated release notes are the release.
        uses: python-semantic-release/python-semantic-release@v10
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          git_committer_name: github-actions
          git_committer_email: actions@users.noreply.github.com
