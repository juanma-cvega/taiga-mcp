# Hooks run through `uv run` so tool versions come from uv.lock, keeping a
# single source of truth for the dev toolchain. Set up with:
#   uv run pre-commit install
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check (lint)
        entry: uv run ruff check --force-exclude
        language: system
        types_or: [python, pyi]
      - id: ruff-format
        name: ruff format (style)
        entry: uv run ruff format --check --force-exclude
        language: system
        types_or: [python, pyi]
      - id: mypy
        name: mypy (type check)
        entry: uv run mypy src tests scripts
        language: system
        pass_filenames: false
        types_or: [python, pyi]
      - id: pytest
        name: pytest
        entry: uv run pytest -q
        language: system
        pass_filenames: false
        types_or: [python, pyi]