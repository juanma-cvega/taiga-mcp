[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "taiga-mcp"
version = "1.1.0"
description = "MCP server exposing Taiga project management — projects, epics, stories, tasks, and sprints — as tools for MCP clients like Claude Code"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "httpx>=0.28.1",
    "mcp[cli]>=1.27.2",
    "pydantic>=2.13.4",
    "python-dotenv>=1.2.2",
]

[project.scripts]
taiga-mcp = "taiga_mcp.server:main"

[tool.hatch.build.targets.wheel]
packages = ["src/taiga_mcp"]

[dependency-groups]
dev = [
    "mypy>=2.2.0",
    "pre-commit>=4.6.0",
    "pytest>=9.0.3",
    "pytest-asyncio>=1.4.0",
    "respx>=0.23.1",
    "ruff>=0.15.21",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.semantic_release]
# The version is derived from the Conventional Commits in the history and is
# owned end to end by CI (.github/workflows/release.yml) -- do not edit the
# version above by hand. feat: -> minor, fix:/perf: -> patch, a BREAKING
# CHANGE: footer -> major; anything else releases nothing.
commit_parser = "conventional"
version_toml = ["pyproject.toml:project.version"]
# uv.lock records the project's own version too, so re-lock after the bump and
# carry the result in the release commit, or the lockfile drifts behind
# pyproject.toml and the next `uv sync` rewrites it under someone's feet.
# `assets` is dual-purpose: these files are both committed alongside the
# version bump AND attached to the GitHub Release, which is why uv.lock shows
# up as a download next to the sdist and wheel.
#
# The `pip install uv` is not redundant with the workflow's setup-uv step: the
# PSR GitHub Action is a Docker action, so build_command runs inside a
# python:3-slim container that cannot see anything installed on the runner
# host. Without this the build dies with "uv: not found" (exit 127).
build_command = "pip install uv && uv lock && uv build"
assets = ["uv.lock"]
# Conventional, so the release commit itself parses as a no-op release. The
# [skip ci] guard is belt-and-braces: pushes made with GITHUB_TOKEN already
# don't retrigger workflows, but that stops being true if this ever moves to a
# PAT (e.g. to satisfy branch protection).
commit_message = "chore: release {version} [skip ci]"
